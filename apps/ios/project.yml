name: FreshPantry
options:
  bundleIdPrefix: com.kunish
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.47.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "62HCT6Q83X"
    # 本地开发默认值。发版版本号的单一真源是 version.txt(由 release-please 维护);
    # CI 构建时以 MARKETING_VERSION=$(cat version.txt) 注入覆盖此处。
    MARKETING_VERSION: "1.20.0"
    # 本地默认 build 号。CI 以 CURRENT_PROJECT_VERSION=<UTC 时间戳> 注入覆盖。
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_ISOLATED_DEFAULT_VALUES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_MODULE_VERIFIER: NO

targets:
  FreshPantry:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantry
        excludes:
          - "Support/Secrets.example.plist"
          # Recipe covers now stream from Supabase Storage (disk-cached on device via
          # RemoteImageCache), NOT bundled — keeps the app ~111MB slimmer. The files
          # stay in the repo as the pipeline's upload source but are excluded from the
          # app target (see apps/recipe-pipeline/README.md → 联网补图 / Supabase 迁移).
          - "Resources/RecipeImages"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      # Embed the share extension so 分享 from 懒饭/下厨房 opens 新建食谱 pre-filled.
      # Plain extension (custom-scheme handoff, no App Group) → the app's own
      # signing/entitlements are unchanged; only this bundle is added to the archive.
      - target: ShareExtension
        embed: true
      - target: FreshPantryWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry
        PRODUCT_NAME: FreshPantry
        INFOPLIST_FILE: FreshPantry/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: FreshPantry/Support/FreshPantry.entitlements
      configs:
        # 本地调试:自动管理开发签名(无需手动证书/描述文件)
        Debug:
          CODE_SIGN_STYLE: Automatic
        # 发布 / CI archive:manual 显式 distribution 签名。ephemeral runner 上自动签名
        # 对 archive 一律退化为 Development → 撞证书配额;改用预生成 App Store profile
        # + 导入的 Apple Distribution 证书,确定走分发签名。
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry App Store

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.ShareExtension
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry ShareExtension App Store

  FreshPantryWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      # widget-only 代码
      - path: FreshPantryWidgets
      # shared widget 逻辑(app target 也编它们,测试可见)
      - path: FreshPantry/Widgets/Shared
      # 纯领域层(仅 Foundation/CryptoKit,整目录安全)
      - path: FreshPantry/Domain
      # 持久化层:13 个 @Model 记录 + ModelContainerFactory(Persistence/ 顶层),
      # 排除会拖入 Supabase / Sync-Household 依赖的文件;repos 单独按需纳入。
      - path: FreshPantry/Persistence
        excludes:
          - "HouseholdCache.swift"
          - "RecipeCatalogCache.swift"
          - "Stores/**"
          - "Repositories/**"
      - path: FreshPantry/Persistence/Repositories/ShoppingRepository.swift
      - path: FreshPantry/Persistence/Repositories/InventoryRepository.swift
      - path: FreshPantry/Persistence/Repositories/MealPlanRepository.swift
      - path: FreshPantry/Persistence/Repositories/FoodLogRepository.swift
      - path: FreshPantry/Persistence/Repositories/SyncOutboxRepository.swift
      # ProfileRecord(@Model)依赖的纯 Foundation DTO `UserProfile`,定义在
      # Sync/Household/ 下但只 import Foundation(无 Supabase/SwiftUI),按需单独纳入。
      - path: FreshPantry/Sync/Household/ProfileModels.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.Widgets
        PRODUCT_NAME: FreshPantryWidgets
        INFOPLIST_FILE: FreshPantryWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: FreshPantryWidgets/FreshPantryWidgets.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry Widgets App Store

  FreshPantryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryTests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.tests
        GENERATE_INFOPLIST_FILE: YES

  # XCUITest — drives the real app over the live TabView lifecycle (the only place
  # cross-tab nav races surface). Launches with `-uiTesting` for a clean, seeded,
  # signed-out state. Runs on iPhone (sidebarAdaptable → bottom tab bar).
  FreshPantryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryUITests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: FreshPantry

# 显式共享 scheme:本地与 CI 都用 `-scheme FreshPantry`。此前依赖 Xcode GUI 打开时
# autocreate 的 user scheme,`xcodegen generate` 重建工程后即丢失("contains no
# schemes"),命令行构建/测试无 scheme 可用 — 显式声明保证每次生成都可复现。
schemes:
  FreshPantry:
    build:
      targets:
        FreshPantry: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FreshPantryTests
        - FreshPantryUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
