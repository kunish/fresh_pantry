name: FreshPantry
options:
  bundleIdPrefix: com.kunish
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.47.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "62HCT6Q83X"
    # 本地开发默认值。发版版本号的单一真源是 version.txt(由 release-please 维护);
    # CI 构建时以 MARKETING_VERSION=$(cat version.txt) 注入覆盖此处。
    MARKETING_VERSION: "1.20.0"
    # 本地默认 build 号。CI 以 CURRENT_PROJECT_VERSION=<UTC 时间戳> 注入覆盖。
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_ISOLATED_DEFAULT_VALUES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_MODULE_VERIFIER: NO

targets:
  FreshPantry:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantry
        excludes:
          - "Support/Secrets.example.plist"
          # Recipe covers now stream from Supabase Storage (disk-cached on device via
          # RemoteImageCache), NOT bundled — keeps the app ~111MB slimmer. The files
          # stay in the repo as the pipeline's upload source but are excluded from the
          # app target (see apps/recipe-pipeline/README.md → 联网补图 / Supabase 迁移).
          - "Resources/RecipeImages"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      # Embed the share extension so 分享 from 懒饭/下厨房 opens 新建食谱 pre-filled.
      # Plain extension (custom-scheme handoff, no App Group) → the app's own
      # signing/entitlements are unchanged; only this bundle is added to the archive.
      - target: ShareExtension
        embed: true
      - target: FreshPantryWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry
        PRODUCT_NAME: FreshPantry
        INFOPLIST_FILE: FreshPantry/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: FreshPantry/Support/FreshPantry.entitlements
      configs:
        # 本地调试:自动管理开发签名(无需手动证书/描述文件)
        Debug:
          CODE_SIGN_STYLE: Automatic
        # 发布 / CI archive:manual 显式 distribution 签名。ephemeral runner 上自动签名
        # 对 archive 一律退化为 Development → 撞证书配额;改用预生成 App Store profile
        # + 导入的 Apple Distribution 证书,确定走分发签名。
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry App Store

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.ShareExtension
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry ShareExtension App Store

  FreshPantryWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      # widget-only 代码(视图/provider/bundle)。
      - path: FreshPantryWidgets
      # 跨进程共享类型(intent/快照/队列/身份/内容枚举)= **dual-target membership**:
      # 同一批源文件 Widgets/Shared 同时编进【主 app target】和【本 widget 扩展 target】,
      # 不经任何 framework。这是 Apple DTS / 官方 sample(Emoji Rangers)对交互式 widget
      # AppIntent 的指定做法。原因:`openAppWhenRun=NO` 的交互 intent 执行被路由到主 app
      # 进程,chronod 按【主 app bundle】里的 AppIntents 运行时索引(linkd/appintentsd 在
      # 安装时注册)按 **identifier** 查找。intent 必须随 app 自身模块被标准抽取/注册,系统
      # 才会在 release/TestFlight 下把它索引进去。
      #   走 framework(无论动态还是 staticlib)都不行:元数据文件虽合并进 app bundle,但
      #   release 下 linkd 不会把 framework/AppIntentsPackage 的 intent 注册进运行时索引
      #   (feedback-assistant #425),真机恒报 "no metadata for ToggleShoppingItemIntent in
      #   com.kunish.freshPantry"(删除+重启+重装也不消失=已排除缓存)。
      #   app 模块是 FreshPantry.*、widget 模块是 FreshPantryWidgets.*,mangled 名不同但
      #   **不失配**:匹配按 identifier "ToggleShoppingItemIntent",各 bundle 用各自模块名自洽。
      - path: FreshPantry/Widgets/Shared
      # ⚠️ widget 扩展仍刻意【只】编 Widgets/Shared(纯 Foundation/AppIntents),【不】编
      # Widgets/App / Persistence / repos / SwiftData:取数全在 app 侧算好写进 App Group
      # (WidgetSnapshotPublisher),widget 只读那份小 JSON;交互勾选只 append 到 App Group
      # 队列(WidgetPendingToggleStore),app 前台再落库(WidgetPendingToggleDrainer→
      # ShoppingToggleService)。真机 30MB 预算不受影响。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.Widgets
        PRODUCT_NAME: FreshPantryWidgets
        INFOPLIST_FILE: FreshPantryWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: FreshPantryWidgets/FreshPantryWidgets.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry Widgets App Store

  FreshPantryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryTests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.tests
        GENERATE_INFOPLIST_FILE: YES

  # XCUITest — drives the real app over the live TabView lifecycle (the only place
  # cross-tab nav races surface). Launches with `-uiTesting` for a clean, seeded,
  # signed-out state. Runs on iPhone (sidebarAdaptable → bottom tab bar).
  FreshPantryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryUITests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: FreshPantry

# 显式共享 scheme:本地与 CI 都用 `-scheme FreshPantry`。此前依赖 Xcode GUI 打开时
# autocreate 的 user scheme,`xcodegen generate` 重建工程后即丢失("contains no
# schemes"),命令行构建/测试无 scheme 可用 — 显式声明保证每次生成都可复现。
schemes:
  FreshPantry:
    build:
      targets:
        FreshPantry: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FreshPantryTests
        - FreshPantryUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
