<h2>方案 1 · 自定义食谱产品流</h2>
<p class="subtitle">按你的选择：首页快捷入口 + 基础字段 + 我的食谱 + 完整管理。</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">首页快捷操作</div>
    <div class="mockup-body">
      <div class="mock-nav">早安，主厨。</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
        <button class="mock-button">添加新食材</button>
        <button class="mock-button">购物清单</button>
        <button class="mock-button">添加食谱</button>
        <button class="mock-button">食谱推荐</button>
      </div>
      <p class="subtitle" style="margin-top:12px">点“添加食谱”进入“我的食谱”。</p>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">我的食谱列表</div>
    <div class="mockup-body">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>我的食谱</strong>
        <button class="mock-button">+ 新建</button>
      </div>
      <div class="placeholder" style="margin-top:12px;height:72px">番茄炒蛋 · 家常 · 15分钟 · 难度 1</div>
      <div class="placeholder" style="margin-top:8px;height:72px">黑椒鸡胸 · 健身 · 25分钟 · 难度 2</div>
      <p class="subtitle" style="margin-top:12px">点卡片进入详情；长按/更多菜单可编辑或删除。</p>
    </div>
  </div>
</div>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">添加/编辑食谱表单</div>
    <div class="mockup-body">
      <input class="mock-input" placeholder="食谱名称 *">
      <input class="mock-input" placeholder="分类 *">
      <input class="mock-input" placeholder="烹饪时间（分钟）*">
      <input class="mock-input" placeholder="难度 1-5 *">
      <textarea class="mock-input" placeholder="简介" style="height:56px"></textarea>
      <div class="placeholder">所需食材：名称 + 用量，可新增/删除多行</div>
      <div class="placeholder">烹饪步骤：步骤文本，可新增/删除/排序</div>
      <button class="mock-button">保存食谱</button>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">详情与管理</div>
    <div class="mockup-body">
      <strong>番茄炒蛋</strong>
      <p class="subtitle">15分钟 · 难度 1 · 家常</p>
      <div class="placeholder">所需食材 + 已备数量</div>
      <div class="placeholder">步骤勾选进度</div>
      <button class="mock-button">编辑</button>
      <button class="mock-button" style="background:#b3261e">删除</button>
      <p class="subtitle" style="margin-top:12px">复用现有详情页能力，补上编辑/删除入口。</p>
    </div>
  </div>
</div>
